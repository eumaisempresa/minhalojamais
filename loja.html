<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><span id="storeNameTitle"></span> - Catálogo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
    
    body { margin:0; font-family:'Inter',sans-serif; background:#f8f9fa; color:#333; }
    header { background:#0A1428; color:white; padding:15px 20px; position:sticky; top:0; z-index:100; }
    .header-content { max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .logo { font-family:'Playfair Display',serif; font-size:26px; }
    .logo .plus { color:#D4AF37; }
    .client-name { font-size:22px; font-weight:600; color:#D4AF37; }
    .search-bar { flex:1; max-width:500px; padding:12px 20px; background:white; border:1px solid #ddd; border-radius:50px; }

    .categories { background:white; padding:12px 20px; border-bottom:1px solid #eee; overflow-x:auto; white-space:nowrap; }
    .cat-btn { display:inline-block; padding:8px 18px; margin-right:10px; background:#f1f1f1; border-radius:30px; cursor:pointer; }
    .cat-btn.active, .cat-btn:hover { background:#0A1428; color:white; }

    .product-grid { max-width:1280px; margin:30px auto; padding:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:24px; }
    .product-card { background:white; border-radius:16px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.08); display:flex; }
    .product-image { width:50%; height:240px; object-fit:cover; }
    .product-info { width:50%; padding:15px; display:flex; flex-direction:column; }
    .product-name { font-size:16px; font-weight:600; margin:0 0 8px 0; }
    .price { color:#D4AF37; font-size:19px; font-weight:700; }
    .stock { font-size:13px; color:#28a745; margin:5px 0; }

    .qty-controls { display:flex; align-items:center; gap:8px; margin:10px 0; }
    .qty-btn { width:28px; height:28px; background:#0A1428; color:white; border:none; border-radius:50%; font-size:16px; cursor:pointer; }

    .floating-cart {
      position:fixed; bottom:25px; right:25px; background:#0A1428; color:white;
      width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:30px; box-shadow:0 8px 25px rgba(10,20,40,0.4); z-index:300; cursor:pointer;
    }

    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:400; align-items:center; justify-content:center; }
    .modal-content { background:white; width:90%; max-width:500px; border-radius:20px; max-height:90vh; overflow-y:auto; }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <div>
        <div class="logo">EU<span class="plus">+</span> NEGÓCIO</div>
        <div class="client-name" id="storeName"></div>
      </div>
      <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar (ex: vest 34)" onkeyup="filterProducts()">
    </div>
  </header>

  <div class="categories">
    <span class="cat-btn active" onclick="filterCategory('all')">Todos</span>
    <span class="cat-btn" onclick="filterCategory('Feminino')">Feminino</span>
    <span class="cat-btn" onclick="filterCategory('Calçados')">Calçados</span>
    <span class="cat-btn" onclick="filterCategory('Infantil')">Infantil</span>
  </div>

  <div class="product-grid" id="productGrid"></div>

  <div class="floating-cart" onclick="showCartModal()">
    🛒 <span id="cart-count" style="position:absolute;top:-8px;right:-8px;background:#D4AF37;color:#000;font-size:16px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">0</span>
  </div>

  <!-- Modal Carrinho -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <div style="padding:20px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between;">
        <h2>Seu Pedido</h2>
        <span onclick="closeCartModal()" style="font-size:28px;cursor:pointer;">✕</span>
      </div>
      <div id="cartItems" style="padding:20px;"></div>
      
      <div style="padding:20px; background:#f8f9fa;">
        <h3>Total: <span id="cartTotal" style="color:#D4AF37;"></span></h3>
        
        <div style="margin:15px 0;">
          <label><strong>Forma de Pagamento:</strong></label><br>
          <select id="paymentMethod" style="width:100%; padding:12px; margin:10px 0;">
            <option value="PIX">PIX</option>
            <option value="Dinheiro">Dinheiro (Presencial)</option>
            <option value="Cartão">Cartão</option>
            <option value="Presencial">Presencial</option>
          </select>
        </div>

        <button onclick="copyPix()" style="width:100%; padding:14px; background:#D4AF37; color:#000; border:none; border-radius:10px; margin-bottom:10px;">
          📋 Copiar PIX
        </button>

        <button onclick="finalizeOrder()" style="width:100%; padding:18px; background:#0A1428; color:white; border:none; border-radius:12px; font-size:18px;">
          Finalizar Reservas e Enviar via WhatsApp
        </button>
      </div>
    </div>
  </div>

  <footer style="background:#0A1428; color:#D4AF37; text-align:center; padding:25px 20px; margin-top:60px;" id="footerInfo">
    <!-- Será preenchido dinamicamente -->
  </footer>

  <script>
    // === CONFIGURAÇÃO DINÂMICA (será preenchida pelo Apps Script) ===
    const storeConfig = {
      name: "Nome da Loja",
      phone: "(51) 98226-4855",
      pix: "27997161826",
      address: "Rua Chaves Barcelos, 278 - São Luís",
      instagram: "@virtuosasbrecho"
    };

    // Atualiza nome e rodapé
    document.getElementById('storeName').textContent = storeConfig.name;
    document.getElementById('storeNameTitle').textContent = storeConfig.name;
    document.getElementById('footerInfo').innerHTML = `
      ${storeConfig.name} • ${storeConfig.address}<br>
      ${storeConfig.phone} • ${storeConfig.instagram}<br>
      Powered by EU+ Negócio
    `;

    // Resto do código (produtos, carrinho, etc.) permanece o mesmo
    const products = [];
    for (let i = 1; i <= 50; i++) {
      products.push({
        id: i,
        name: `Produto ${i} - ${['Blusa Feminina', 'Bota Chelsea', 'Calça Jeans', 'Vestido Floral', 'Tênis Infantil'][i%5]}`,
        category: ['Feminino', 'Calçados', 'Infantil'][i%3],
        price: 35 + (i % 85),
        size: ['P','M','G','34','36'][i%5],
        stock: 8 + (i % 12),
        img: `https://picsum.photos/id/${i+30}/600/600`
      });
    }

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const total = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
      document.getElementById('cart-count').textContent = total;
    }

    // ... (o resto do código de produtos, carrinho, filtros permanece igual ao anterior)

    function copyPix() {
      navigator.clipboard.writeText(storeConfig.pix);
      alert(`✅ PIX copiado: ${storeConfig.pix}`);
    }

    function finalizeOrder() {
      const payment = document.getElementById('paymentMethod').value;
      let msg = `Olá ${storeConfig.name}! Gostaria de confirmar as seguintes reservas:\n\n`;
      let total = 0;

      cart.forEach(item => {
        const qtd = item.quantity || 1;
        msg += `- ${item.name} (Tam: ${item.size}) x${qtd} - Reserva ${item.reservaId} - R$ ${item.price * qtd},00\n`;
        total += item.price * qtd;
      });

      msg += `\nTotal: R$ ${total},00\nForma de Pagamento: ${payment}`;

      window.open(`https://wa.me/${storeConfig.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
      closeCartModal();
      cart = [];
      saveCart();
      renderProducts(products);
    }

    // Manter as funções restantes (renderProducts, changeProductQty, etc.) do código anterior
    // ... (copie o resto do script do modelo anterior que você aprovou)

    document.addEventListener('DOMContentLoaded', () => {
      renderProducts(products);
      updateCartCount();
    });
  </script>
</body>
</html>
